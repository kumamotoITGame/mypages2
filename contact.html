          <li><a href="index.html">Home</a></li>
          <li>Contact</li>
        </ol>
      </div>
      <article>
        <h1>お問い合わせ</h1>
        <p class="lead">お気軽にお問い合わせをしてください</p>
        <p>下記メールフォームをご記入いただき、「送信する」ボタンを押してください。</p>
        <p>「<span class="must">※</span>」は必須項目です。</p>
        <section>
        <h2>お問い合わせフォーム</h2>

          <form id="entry" action="mailto:yourgmail@gmail.com" method="post" enctype="text/plain">

            <dl>
              <dt>お名前 <span class="must">※</span></dt>
              <dd><input type="text" name="name" id="name" required></dd>

              <dt>メールアドレス <span class="must">※</span></dt>
              <dd><input type="email" name="email" id="email" required></dd>

              <!--
              <dt>所属コース</dt>
              <dd>
                <select name="interest" id="interest">
                  <option value="システム開発コース">システム開発コース</option>
                  <option value="AI・データサイエンスコース">AI・データサイエンスコース</option>
                  <option value="ネットワークセキュリティコース">ネットワークセキュリティコース</option>
                </select>
              </dd>
              
              <dt>お問い合せ種別</dt>
              <dd>
                <label><input type="checkbox" name="category" value="学校への質問">学校への質問</label>
                <label><input type="checkbox" name="category" value="先生への質問">先生への質問</label>
                <label><input type="checkbox" name="category" value="その他質問">その他質問</label>
              </dd>
              -->
              
              <dt>お問い合せ内容</dt>
                <dd>
                  <textarea name="detail" id="detail"></textarea>
                </dd>
              </dl>

            <p id="submit_button_cover">
              <input type="submit" id="submit_button" value="送信する">
            </p>

          </form>
        </section>
      </article>
    </div>

    <!--/メイン-->
